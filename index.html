<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">

  <script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script>

  <script>
    AFRAME.registerComponent('smooth-tilt', {
      schema: {
        amplitude: { type: 'number', default: 12 },
        period: { type: 'number', default: 10000 }
      },

      tick: function (time) {
        const amplitude = this.data.amplitude;
        const period = this.data.period;

        const angle =
          amplitude * Math.sin((2 * Math.PI * time) / period);

        this.el.object3D.rotation.z =
          THREE.MathUtils.degToRad(angle);
      }
    });
  </script>

  <title>Rotating World VR</title>
</head>

<body>
  <a-scene>

    <!-- この中の空間全体だけが左右に傾く -->
   <a-entity
  id="world"
  smooth-tilt="amplitude: 12; period: 10000">
      <!-- 床 -->
      <a-plane
        position="0 0 -6"
        rotation="-90 0 0"
        width="12"
        height="20"
        color="#444444">
      </a-plane>

      <!-- 床の中央線 -->
      <a-box
        position="0 0.01 -6"
        width="0.08"
        height="0.02"
        depth="20"
        color="#FFFFFF">
      </a-box>

      <!-- 左壁：固定 -->
      <a-box
        position="-4 2.5 -6"
        width="0.2"
        height="5"
        depth="20"
        color="#4466AA">
      </a-box>

      <!-- 右壁：固定 -->
      <a-box
        position="4 2.5 -6"
        width="0.2"
        height="5"
        depth="20"
        color="#AA4466">
      </a-box>

      <!-- 天井 -->
      <a-box
        position="0 5 -6"
        width="8"
        height="0.2"
        depth="20"
        color="#222233">
      </a-box>

      <!-- 奥の壁：固定 -->
      <a-box
        position="0 2.5 -15"
        width="8"
        height="5"
        depth="0.2"
        color="#111122">
      </a-box>

    </a-entity>

    <!-- 背景 -->
    <a-sky color="#050510"></a-sky>

    <!-- 環境光 -->
    <a-entity
      light="type: ambient; color: #777799; intensity: 0.7">
    </a-entity>

    <!-- 正面のライト -->
    <a-entity
      light="type: point; color: #FFFFFF; intensity: 1.2; distance: 20"
      position="0 3 0">
    </a-entity>

    <!-- 視点は回転するworldの外に置く -->
    <a-entity
      camera
      look-controls
      position="0 1.6 0">
    </a-entity>

  </a-scene>
</body>
</html>
