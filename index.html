<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">

  <script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script>

  <title>VR Slash Game</title>

  <script>
    /*
      刀と障害物の距離を毎フレーム確認する。
      一定距離以内に入ったら障害物を消す。
    */
    AFRAME.registerComponent('slash-collider', {
      schema: {
        target: { type: 'string', default: '.slashable' },
        distance: { type: 'number', default: 0.65 }
      },

      init: function () {
        this.swordPosition = new THREE.Vector3();
        this.targetPosition = new THREE.Vector3();
      },

      tick: function () {
        const targets = document.querySelectorAll(this.data.target);

        this.el.object3D.getWorldPosition(this.swordPosition);

        targets.forEach((target) => {
          if (!target.object3D.visible) return;

          target.object3D.getWorldPosition(this.targetPosition);

          const distance =
            this.swordPosition.distanceTo(this.targetPosition);

          if (distance < this.data.distance) {
            this.slashTarget(target);
          }
        });
      },

      slashTarget: function (target) {
        target.object3D.visible = false;

        const score = document.querySelector('#score');
        const currentScore =
          Number(score.getAttribute('value')) || 0;

        score.setAttribute('value', currentScore + 1);

        // 2秒後に別の位置へ復活
        setTimeout(() => {
          const x = (Math.random() - 0.5) * 5;
          const y = 1 + Math.random() * 2;
          const z = -3 - Math.random() * 4;

          target.setAttribute('position', `${x} ${y} ${z}`);
          target.object3D.visible = true;
        }, 2000);
      }
    });
  </script>
</head>

<body>
  <a-scene
    background="color: #080818"
    renderer="colorManagement: true">

    <!-- 床 -->
    <a-plane
      position="0 0 -5"
      rotation="-90 0 0"
      width="15"
      height="15"
      color="#222233">
    </a-plane>

    <!-- スコア -->
    <a-text
      id="score"
      value="0"
      position="0 3 -3"
      align="center"
      width="4"
      color="#FFFFFF">
    </a-text>

    <!-- 障害物 -->
    <a-box
      class="slashable"
      position="-1.5 1.5 -4"
      width="0.7"
      height="0.7"
      depth="0.7"
      color="#FF3355"
      animation="
        property: rotation;
        to: 360 360 0;
        dur: 4000;
        loop: true;
        easing: linear">
    </a-box>

    <a-box
      class="slashable"
      position="0 2.2 -5"
      width="0.7"
      height="0.7"
      depth="0.7"
      color="#33DDFF"
      animation="
        property: rotation;
        to: 0 360 360;
        dur: 3500;
        loop: true;
        easing: linear">
    </a-box>

    <a-box
      class="slashable"
      position="1.5 1.3 -4"
      width="0.7"
      height="0.7"
      depth="0.7"
      color="#FFCC33"
      animation="
        property: rotation;
        to: 360 0 360;
        dur: 3000;
        loop: true;
        easing: linear">
    </a-box>

    <!-- カメラ -->
    <a-entity
      camera
      look-controls
      position="0 1.6 0">
    </a-entity>

    <!-- 左手 -->
    <a-entity
      id="left-hand"
      hand-tracking-controls="hand: left">
    </a-entity>

    <!-- 右手 -->
    <a-entity
      id="right-hand"
      hand-tracking-controls="hand: right">

      <!-- 刀 -->
      <a-entity
        id="sword"
        position="0 -0.05 -0.45"
        rotation="-90 0 0"
        slash-collider="distance: 0.65">

        <!-- 柄 -->
        <a-cylinder
          position="0 -0.18 0"
          radius="0.04"
          height="0.35"
          color="#222222">
        </a-cylinder>

        <!-- 鍔 -->
        <a-cylinder
          position="0 0 0"
          rotation="90 0 0"
          radius="0.13"
          height="0.025"
          color="#FFD700">
        </a-cylinder>

        <!-- 刃 -->
        <a-box
          position="0 0.65 0"
          width="0.07"
          height="1.3"
          depth="0.025"
          color="#CCFFFF"
          material="
            emissive: #66FFFF;
            emissiveIntensity: 0.8">
        </a-box>

      </a-entity>
    </a-entity>

    <!-- 光 -->
    <a-entity
      light="type: ambient; intensity: 0.7; color: #BBBBFF">
    </a-entity>

    <a-entity
      light="type: directional; intensity: 1"
      position="1 4 2">
    </a-entity>

    <a-sky color="#080818"></a-sky>

  </a-scene>
</body>
</html>
