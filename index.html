<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">

  <script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script>

  <title>Human Sway Dot</title>

  <script>
    AFRAME.registerComponent('human-sway', {
      schema: {
        amplitude: { type: 'number', default: 0.3 },
        period: { type: 'number', default: 5000 },
        centerX: { type: 'number', default: 0 },
        centerY: { type: 'number', default: 1.6 },
        centerZ: { type: 'number', default: -3 }
      },

      tick: function (time) {
        const amplitude = this.data.amplitude;
        const period = this.data.period;

        // 正弦波で左右位置を計算
        const x =
          this.data.centerX +
          amplitude * Math.sin(
            (2 * Math.PI * time) / period
          );

        this.el.object3D.position.set(
          x,
          this.data.centerY,
          this.data.centerZ
        );
      }
    });
  </script>
</head>

<body>
  <a-scene
    background="color: #FFFFFF"
    renderer="colorManagement: true">

    <!-- 左右に振動する赤い点 -->
    <a-sphere
      human-sway="
        amplitude: 0.3;
        period: 5000;
        centerX: 0;
        centerY: 1.6;
        centerZ: -3"
      radius="0.08"
      color="#FF0000"
      material="
        emissive: #FF0000;
        emissiveIntensity: 0.4">
    </a-sphere>

    <!-- 視点 -->
    <a-entity
      camera
      look-controls
      position="0 1.6 0">
    </a-entity>

    <!-- 白く均一に見せるための光 -->
    <a-entity
      light="
        type: ambient;
        color: #FFFFFF;
        intensity: 1">
    </a-entity>

    <a-sky color="#FFFFFF"></a-sky>

  </a-scene>
</body>
</html>
