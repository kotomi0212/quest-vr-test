<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">

  <script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script>

  <title>VR Slash Game</title>

<script>
  AFRAME.registerComponent('hand-slash', {
    schema: {
      target: { type: 'string', default: '.slashable' },
      distance: { type: 'number', default: 0.8 }
    },

    init: function () {
      this.handPosition = new THREE.Vector3();
      this.targetPosition = new THREE.Vector3();
      this.cooldown = false;
    },

    tick: function () {
      if (this.cooldown) return;

      const handControls =
        this.el.components['hand-tracking-controls'];

      // 手が認識されていない間は判定しない
      if (!handControls) return;

      this.el.object3D.getWorldPosition(this.handPosition);

      const targets =
        document.querySelectorAll(this.data.target);

      targets.forEach((target) => {
        if (!target.object3D.visible) return;

        target.object3D.getWorldPosition(this.targetPosition);

        const distance =
          this.handPosition.distanceTo(this.targetPosition);

        if (distance < this.data.distance) {
          this.cooldown = true;
          this.slashTarget(target);

          setTimeout(() => {
            this.cooldown = false;
          }, 500);
        }
      });
    },

    slashTarget: function (target) {
      target.object3D.visible = false;

      const score = document.querySelector('#score');

      if (score) {
        const currentScore =
          Number(score.getAttribute('value')) || 0;

        score.setAttribute(
          'value',
          String(currentScore + 1)
        );
      }

      setTimeout(() => {
        const x = (Math.random() - 0.5) * 3;
        const y = 1.0 + Math.random() * 1.5;
        const z = -1.5 - Math.random() * 1.5;

        target.setAttribute(
          'position',
          `${x} ${y} ${z}`
        );

        target.object3D.visible = true;
      }, 2000);
    }
  });
</script>
</head>

<body>
  <a-scene
    background="color: #080818"
    renderer="colorManagement: true">

    <!-- 床 -->
    <a-plane
      position="0 0 -5"
      rotation="-90 0 0"
      width="15"
      height="15"
      color="#222233">
    </a-plane>

    <!-- スコア -->
    <a-text
      id="score"
      value="0"
      position="0 3 -3"
      align="center"
      width="4"
      color="#FFFFFF">
    </a-text>

    <!-- 障害物 -->
    <a-box
  class="slashable"
  position="-0.5 1.4 -1.2"
  width="0.4"
  height="0.4"
  depth="0.4"
  color="#FF3355">
</a-box>

<a-box
  class="slashable"
  position="0.3 1.7 -1.4"
  width="0.4"
  height="0.4"
  depth="0.4"
  color="#33DDFF">
</a-box>

<a-box
  class="slashable"
  position="0.7 1.2 -1.1"
  width="0.4"
  height="0.4"
  depth="0.4"
  color="#FFCC33">
</a-box>
    <!-- カメラ -->
    <a-entity
      camera
      look-controls
      position="0 1.6 0">
    </a-entity>

    <!-- 左手 -->
    <a-entity
      id="left-hand"
      hand-tracking-controls="hand: left">
    </a-entity>

    <!-- 右手 -->
    <a-entity
  id="right-hand"
  hand-tracking-controls="hand: right"
  hand-slash="distance: 0.8">

  <!-- 刀は見た目用 -->
  <a-entity
    id="sword"
    position="0 0 -0.35"
    rotation="-90 0 0">

    <a-cylinder
      position="0 -0.18 0"
      radius="0.04"
      height="0.35"
      color="#222222">
    </a-cylinder>

    <a-cylinder
      position="0 0 0"
      rotation="90 0 0"
      radius="0.13"
      height="0.025"
      color="#FFD700">
    </a-cylinder>

    <a-box
      position="0 0.65 0"
      width="0.07"
      height="1.3"
      depth="0.025"
      color="#CCFFFF"
      material="
        emissive: #66FFFF;
        emissiveIntensity: 0.8">
    </a-box>

  </a-entity>
</a-entity>

  

    <!-- 光 -->
    <a-entity
      light="type: ambient; intensity: 0.7; color: #BBBBFF">
    </a-entity>

    <a-entity
      light="type: directional; intensity: 1"
      position="1 4 2">
    </a-entity>

    <a-sky color="#080818"></a-sky>

  </a-scene>
</body>
</html>
