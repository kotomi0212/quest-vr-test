<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">

  <script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script>

  <title>VR Slash Game</title>

<script>
  AFRAME.registerComponent('finger-collision', {
    schema: {
      target: { type: 'string', default: '.slashable' },
      radius: { type: 'number', default: 0.08 }
    },

    init: function () {
      this.fingerPosition = new THREE.Vector3();
      this.targetBox = new THREE.Box3();
      this.cooldownTargets = new WeakSet();

      // 人差し指の位置を確認するための赤い球
      this.debugSphere = document.createElement('a-sphere');
      this.debugSphere.setAttribute('radius', '0.04');
      this.debugSphere.setAttribute('color', '#FF0000');
      this.debugSphere.setAttribute(
        'material',
        'emissive: #FF0000; emissiveIntensity: 1'
      );

      this.el.appendChild(this.debugSphere);
    },

    tick: function () {
      const scene = this.el.sceneEl;
      const frame = scene.frame;
      const renderer = scene.renderer;

      if (!frame || !renderer || !renderer.xr) return;

      const session = renderer.xr.getSession();
      const referenceSpace = renderer.xr.getReferenceSpace();

      if (!session || !referenceSpace) return;

      let rightHand = null;

      // 右手の入力情報を探す
      for (const inputSource of session.inputSources) {
        if (
          inputSource.handedness === 'right' &&
          inputSource.hand
        ) {
          rightHand = inputSource;
          break;
        }
      }

      if (!rightHand) return;

      // 右手の人差し指先を取得
      const fingerJoint =
        rightHand.hand.get('index-finger-tip');

      if (!fingerJoint) return;

      const fingerPose =
        frame.getJointPose(fingerJoint, referenceSpace);

      if (!fingerPose) return;

      const position = fingerPose.transform.position;

      this.fingerPosition.set(
        position.x,
        position.y,
        position.z
      );

      // 赤い確認球を指先へ移動
      this.debugSphere.object3D.position.copy(
        this.fingerPosition
      );

      const targets =
        document.querySelectorAll(this.data.target);

      targets.forEach((target) => {
        if (!target.object3D.visible) return;
        if (this.cooldownTargets.has(target)) return;

        // 箱そのものの範囲を取得
        this.targetBox.setFromObject(target.object3D);

        // 指先から箱までの最短距離
        const distance =
          this.targetBox.distanceToPoint(
            this.fingerPosition
          );

        if (distance <= this.data.radius) {
          this.hitTarget(target);
        }
      });
    },

    hitTarget: function (target) {
      this.cooldownTargets.add(target);
      target.object3D.visible = false;

      const score = document.querySelector('#score');

      if (score) {
        const current =
          Number(score.getAttribute('value')) || 0;

        score.setAttribute(
          'value',
          String(current + 1)
        );
      }

      // 2秒後に場所を変えて復活
      setTimeout(() => {
        const x = (Math.random() - 0.5) * 1.6;
        const y = 1.0 + Math.random() * 1.2;
        const z = -0.7 - Math.random() * 0.8;

        target.setAttribute(
          'position',
          `${x} ${y} ${z}`
        );

        target.object3D.visible = true;
        this.cooldownTargets.delete(target);
      }, 2000);
    }
  });
</script>
</head>

<body>
  <a-scene
  finger-collision="target: .slashable; radius: 0.08"
  background="color: #080818"
  renderer="colorManagement: true">

    <!-- 床 -->
    <a-plane
      position="0 0 -5"
      rotation="-90 0 0"
      width="15"
      height="15"
      color="#222233">
    </a-plane>

    <!-- スコア -->
    <a-text
      id="score"
      value="0"
      position="0 3 -3"
      align="center"
      width="4"
      color="#FFFFFF">
    </a-text>

    <!-- 障害物 -->
    <a-box
  class="slashable"
  position="-0.5 1.4 -1.2"
  width="0.4"
  height="0.4"
  depth="0.4"
  color="#FF3355">
</a-box>

<a-box
  class="slashable"
  position="0.3 1.7 -1.4"
  width="0.4"
  height="0.4"
  depth="0.4"
  color="#33DDFF">
</a-box>

<a-box
  class="slashable"
  position="0.7 1.2 -1.1"
  width="0.4"
  height="0.4"
  depth="0.4"
  color="#FFCC33">
</a-box>
    <!-- カメラ -->
    <a-entity
      camera
      look-controls
      position="0 1.6 0">
    </a-entity>

    <!-- 左手 -->
    <a-entity
      id="left-hand"
      hand-tracking-controls="hand: left">
    </a-entity>

    <!-- 右手 -->
    <a-entity
  id="right-hand"
  hand-tracking-controls="hand: right"
  hand-slash="distance: 0.8">

  <!-- 刀は見た目用 -->
  <a-entity
    id="sword"
    position="0 0 -0.35"
    rotation="-90 0 0">

    <a-cylinder
      position="0 -0.18 0"
      radius="0.04"
      height="0.35"
      color="#222222">
    </a-cylinder>

    <a-cylinder
      position="0 0 0"
      rotation="90 0 0"
      radius="0.13"
      height="0.025"
      color="#FFD700">
    </a-cylinder>

    <a-box
      position="0 0.65 0"
      width="0.07"
      height="1.3"
      depth="0.025"
      color="#CCFFFF"
      material="
        emissive: #66FFFF;
        emissiveIntensity: 0.8">
    </a-box>

  </a-entity>
</a-entity>

  

    <!-- 光 -->
    <a-entity
      light="type: ambient; intensity: 0.7; color: #BBBBFF">
    </a-entity>

    <a-entity
      light="type: directional; intensity: 1"
      position="1 4 2">
    </a-entity>

    <a-sky color="#080818"></a-sky>

  </a-scene>
</body>
</html>
